---
kind: Pod
apiVersion: v1
metadata:
  name: my-csi-app-1
spec:
  containers:
    - name: my-frontend
      image: harbor.magic.remote/docker-hub/nginx:alpine
      # image: busybox
      volumeMounts:
        - mountPath: "/data"
          name: seaweedfs-volume
      command: ["sleep", "1000000"]
  volumes:
    - name: seaweedfs-volume
      persistentVolumeClaim:
        claimName: seaweedfs-csi-pvc
